<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f111a">
    <meta name="referrer" content="no-referrer">
    <link rel="manifest" href="manifest.json">
    <title>AI Summary Reader</title>
    <style>
        /* === BIẾN MÀU SẮC (THEMES) === */
        :root {
            --bg-color: #0f111a;
            --text-color: #e2e8f0;
            --panel-bg: #1e2130;
            --accent: #7c3aed;
            --accent-hover: #6d28d9;
            --accent-glow: rgba(124, 58, 237, 0.4);
            --update-bg: rgba(234, 179, 8, 0.15);
            --update-border: #eab308;
            --card-bg: #1e2433;
            --card-border: #2d3748;
            --clue-bg: #1e1e2d;
            --input-bg: #0f111a;
            --glass-bg: rgba(30, 33, 48, 0.85);
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-size: 18px;
        }

        [data-theme="sepia"] {
            --bg-color: #f4ecd8;
            --text-color: #433422;
            --panel-bg: #e8dcc4;
            --accent: #b45309;
            --accent-hover: #92400e;
            --accent-glow: rgba(180, 83, 9, 0.3);
            --update-bg: rgba(217, 119, 6, 0.15);
            --update-border: #d97706;
            --card-bg: #eaddc5;
            --card-border: #d1c3a7;
            --clue-bg: #eaddc5;
            --input-bg: #f4ecd8;
            --glass-bg: rgba(232, 220, 196, 0.85);
        }

        [data-theme="oled"] {
            --bg-color: #000000;
            --text-color: #d1d5db;
            --panel-bg: #0a0a0a;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --accent-glow: rgba(59, 130, 246, 0.35);
            --update-bg: rgba(234, 179, 8, 0.1);
            --update-border: #ca8a04;
            --card-bg: #050505;
            --card-border: #1f2937;
            --clue-bg: #050505;
            --input-bg: #000000;
            --glass-bg: rgba(10, 10, 10, 0.9);
        }

        [data-theme="purple"] {
            --bg-color: #12061f;
            --text-color: #e0d4f5;
            --panel-bg: #1c0e33;
            --accent: #a855f7;
            --accent-hover: #9333ea;
            --accent-glow: rgba(168, 85, 247, 0.4);
            --update-bg: rgba(168, 85, 247, 0.12);
            --update-border: #a855f7;
            --card-bg: #1a0d2e;
            --card-border: #2e1a4a;
            --clue-bg: #1a0d2e;
            --input-bg: #12061f;
            --glass-bg: rgba(28, 14, 51, 0.85);
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --panel-bg: #ffffff;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --update-bg: rgba(234, 179, 8, 0.12);
            --update-border: #f59e0b;
            --card-bg: #f1f5f9;
            --card-border: #e2e8f0;
            --clue-bg: #f1f5f9;
            --input-bg: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.88);
        }

        body {
            font-family: var(--font-family);
            font-size: var(--font-size);
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s, color 0.3s;
        }

        #container {
            width: 100%;
            max-width: 800px;
            padding: 15px;
            box-sizing: border-box;
        }

        /* === PROGRESS BAR GRADIENT + GLOW === */
        #progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), #ec4899, #f59e0b, var(--accent));
            background-size: 300% 100%;
            animation: progressGlow 3s linear infinite;
            width: 0%;
            z-index: 9999;
            box-shadow: 0 0 12px var(--accent-glow), 0 0 4px var(--accent-glow);
            transition: width 0.1s;
        }

        @keyframes progressGlow {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 300% 50%;
            }
        }

        /* FAB SPEED DIAL - NÚT CÀI ĐẶT DUY NHẤT */
        .fab-container {
            position: fixed;
            bottom: 30px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            gap: 0;
        }

        .fab-main {
            background: var(--accent);
            color: white;
            border: none;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 4px 20px var(--accent-glow), 0 2px 10px rgba(0, 0, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
            position: relative;
        }

        .fab-main:hover {
            transform: scale(1.1);
        }

        .fab-main:active {
            transform: scale(0.9);
        }

        .fab-main.open {
            transform: rotate(45deg);
            background: #ef4444;
        }

        .fab-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 12px;
            pointer-events: none;
        }

        .fab-menu.open {
            pointer-events: auto;
        }

        .fab-item {
            background: var(--panel-bg);
            color: var(--text-color);
            border: 1px solid var(--card-border);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.35);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: scale(0.3) translateY(20px);
            position: relative;
        }

        .fab-menu.open .fab-item {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* Stagger animation cho từng nút */
        .fab-menu.open .fab-item:nth-child(1) {
            transition-delay: 0.02s;
        }

        .fab-menu.open .fab-item:nth-child(2) {
            transition-delay: 0.05s;
        }

        .fab-menu.open .fab-item:nth-child(3) {
            transition-delay: 0.08s;
        }

        .fab-menu.open .fab-item:nth-child(4) {
            transition-delay: 0.11s;
        }

        .fab-menu.open .fab-item:nth-child(5) {
            transition-delay: 0.14s;
        }

        .fab-menu.open .fab-item:nth-child(6) {
            transition-delay: 0.17s;
        }

        .fab-item:hover {
            transform: scale(1.15);
            box-shadow: 0 5px 18px rgba(0, 0, 0, 0.5);
        }

        .fab-item:active {
            transform: scale(0.9);
        }

        .fab-item.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        /* Tooltip cho desktop */
        .fab-item::before {
            content: attr(data-label);
            position: absolute;
            right: 54px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--panel-bg);
            color: var(--text-color);
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            border: 1px solid var(--card-border);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
        }

        .fab-item:hover::before {
            opacity: 1;
        }

        /* Overlay mờ khi FAB mở */
        .fab-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999;
            background: rgba(0, 0, 0, 0.2);
        }

        .fab-overlay.show {
            display: block;
        }

        /* MỤC LỤC TRƯỢT (SIDEBAR) */
        #sidebar {
            position: fixed;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100%;
            background: var(--panel-bg);
            z-index: 4000;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 5px 0 25px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--card-border);
        }

        #sidebar.open {
            left: 0;
        }

        .sidebar-header {
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 1px solid var(--card-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-sidebar {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            height: auto;
            min-height: auto;
        }

        /* Tìm kiếm trong sidebar */
        .sidebar-search {
            padding: 12px 16px;
            border-bottom: 1px solid var(--card-border);
        }

        .sidebar-search input {
            width: 100%;
            padding: 10px 14px;
            box-sizing: border-box;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            background: var(--input-bg);
            color: var(--text-color);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .sidebar-search input:focus {
            border-color: var(--accent);
        }

        #toc-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
            list-style: none;
            margin: 0;
        }

        .toc-group-header {
            padding: 10px 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--accent);
            letter-spacing: 1px;
            opacity: 0.8;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            border-bottom: 1px solid var(--card-border);
        }

        .toc-group-header:hover {
            opacity: 1;
        }

        .toc-group-header .arrow {
            transition: transform 0.2s;
            font-size: 10px;
        }

        .toc-group-header.collapsed .arrow {
            transform: rotate(-90deg);
        }

        .toc-group {
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .toc-group.collapsed {
            max-height: 0 !important;
        }

        .toc-item {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s;
        }

        .toc-item:hover {
            background: rgba(124, 58, 237, 0.05);
            padding-left: 24px;
        }

        .toc-item:active {
            background: var(--accent);
            color: white;
        }

        .toc-item.active {
            color: var(--accent);
            font-weight: bold;
            border-left: 4px solid var(--accent);
            background: rgba(124, 58, 237, 0.1);
        }

        /* === NAV BAR GLASSMORPHISM === */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 12px 20px;
            border-radius: 12px;
            margin-top: 15px;
            position: sticky;
            top: 15px;
            z-index: 90;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--card-border);
        }

        .nav-center {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            padding: 0 10px;
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 0 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 44px;
        }

        button:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        #chap-btn {
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            color: var(--text-color);
            width: 100%;
            max-width: 220px;
            font-size: 14px;
            justify-content: space-between;
            padding: 0 15px;
        }

        #content-box {
            margin-top: 20px;
            padding-bottom: 60px;
            min-height: 80vh;
        }

        /* CSS CHO INFINITY SCROLL */
        .chapter-wrapper {
            animation: fadeIn 0.6s ease-out;
            padding-bottom: 30px;
        }

        /* Smooth page transition */
        .chapter-wrapper.fade-out {
            animation: fadeOut 0.25s ease-in forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: translateY(0);
            }

            to {
                opacity: 0;
                transform: translateY(-20px);
            }
        }

        .chap-divider {
            text-align: center;
            margin: 50px 0 30px 0;
            font-size: 22px;
            font-weight: bold;
            color: var(--accent);
            display: flex;
            align-items: center;
        }

        .chap-divider::before,
        .chap-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px dashed var(--card-border);
            margin: 0 15px;
        }

        /* === SECTION TITLE PILL STYLE === */
        .section-title {
            color: #38bdf8;
            font-size: 0.95em;
            font-weight: bold;
            text-transform: uppercase;
            margin: 35px 0 15px 0;
            padding: 10px 18px;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.08), rgba(124, 58, 237, 0.08));
            border: 1px solid rgba(56, 189, 248, 0.15);
            border-bottom: 2px solid rgba(56, 189, 248, 0.25);
            letter-spacing: 0.5px;
        }

        [data-theme="sepia"] .section-title {
            color: var(--accent);
            background: linear-gradient(135deg, rgba(180, 83, 9, 0.08), rgba(217, 119, 6, 0.08));
            border-color: rgba(180, 83, 9, 0.2);
        }

        [data-theme="light"] .section-title {
            color: var(--accent);
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.06), rgba(168, 85, 247, 0.06));
            border-color: rgba(99, 102, 241, 0.15);
        }

        .story-text {
            margin-bottom: 18px;
            text-align: justify;
        }

        .highlight {
            color: #ec4899;
            font-weight: bold;
        }

        [data-theme="sepia"] .highlight {
            color: #b91c1c;
        }

        [data-theme="light"] .highlight {
            color: #db2777;
        }

        /* === CHARACTER CARD NÂNG CẤP === */
        .char-card {
            background: var(--card-bg);
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid var(--card-border);
            overflow: hidden;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .char-card:hover {
            border-color: var(--accent);
            box-shadow: 0 4px 20px var(--accent-glow);
            transform: translateY(-2px);
        }

        .char-main {
            padding: 12px 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            cursor: pointer;
            list-style: none;
            transition: background 0.2s;
        }

        .char-main:hover {
            background: rgba(124, 58, 237, 0.04);
        }

        .char-main::-webkit-details-marker {
            display: none;
        }

        .char-main::after {
            content: '▼';
            margin-left: auto;
            font-size: 12px;
            color: var(--text-color);
            opacity: 0.5;
            transition: transform 0.3s ease;
        }

        details[open] .char-main::after {
            content: '▲';
            transform: rotate(180deg);
        }

        details[open] .char-update {
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                max-height: 0;
            }

            to {
                opacity: 1;
                max-height: 200px;
            }
        }

        .char-name {
            font-weight: bold;
            font-size: 1.1em;
            margin-right: 4px;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: 600;
            background: #334155;
            color: #94a3b8;
            transition: all 0.2s;
        }

        .badge.tuvi {
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
        }

        .badge.status {
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
        }

        .badge.dead {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
        }

        /* === BADGE THEME OVERRIDES === */
        [data-theme="sepia"] .badge {
            background: rgba(120, 80, 40, 0.12);
            color: #78501e;
        }

        [data-theme="sepia"] .badge.tuvi {
            background: rgba(180, 83, 9, 0.12);
            color: #b45309;
        }

        [data-theme="sepia"] .badge.status {
            background: rgba(22, 120, 55, 0.12);
            color: #15803d;
        }

        [data-theme="sepia"] .badge.dead {
            background: rgba(185, 28, 28, 0.12);
            color: #b91c1c;
        }

        [data-theme="oled"] .badge {
            background: rgba(100, 116, 139, 0.15);
            color: #94a3b8;
        }

        [data-theme="oled"] .badge.tuvi {
            background: rgba(59, 130, 246, 0.12);
            color: #60a5fa;
        }

        [data-theme="oled"] .badge.status {
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
        }

        [data-theme="oled"] .badge.dead {
            background: rgba(239, 68, 68, 0.12);
            color: #f87171;
        }

        [data-theme="purple"] .badge {
            background: rgba(168, 85, 247, 0.1);
            color: #c084fc;
        }

        [data-theme="purple"] .badge.tuvi {
            background: rgba(139, 92, 246, 0.12);
            color: #a78bfa;
        }

        [data-theme="purple"] .badge.status {
            background: rgba(52, 211, 153, 0.1);
            color: #6ee7b7;
        }

        [data-theme="purple"] .badge.dead {
            background: rgba(244, 63, 94, 0.12);
            color: #fb7185;
        }

        [data-theme="light"] .badge {
            background: rgba(100, 116, 139, 0.1);
            color: #475569;
        }

        [data-theme="light"] .badge.tuvi {
            background: rgba(99, 102, 241, 0.1);
            color: #4f46e5;
        }

        [data-theme="light"] .badge.status {
            background: rgba(22, 163, 74, 0.1);
            color: #16a34a;
        }

        [data-theme="light"] .badge.dead {
            background: rgba(220, 38, 38, 0.1);
            color: #dc2626;
        }

        .char-update {
            background: var(--update-bg);
            padding: 12px 16px;
            border-top: 1px dashed var(--update-border);
            border-left: 4px solid var(--update-border);
            font-size: 0.95em;
        }

        /* === CLUE ITEM NÂNG CẤP === */
        .clue-item {
            background: var(--clue-bg);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid #ec4899;
            transition: all 0.25s;
        }

        .clue-item:hover {
            border-left-width: 5px;
            box-shadow: 0 2px 15px rgba(236, 72, 153, 0.15);
            transform: translateX(3px);
        }

        .clue-item .clue-icon {
            background: linear-gradient(135deg, #ec4899, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: bold;
            margin-right: 4px;
        }

        .loading {
            color: #888;
            font-style: italic;
            text-align: center;
            margin-top: 50px;
        }

        /* Loading spinner cho infinity scroll */
        .scroll-loading {
            text-align: center;
            padding: 20px;
            color: var(--accent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .scroll-loading.visible {
            opacity: 1;
        }

        .scroll-loading .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--card-border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* === TOAST SLIDE-UP ANIMATION === */
        .toast {
            visibility: hidden;
            min-width: 200px;
            background-color: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: var(--text-color);
            text-align: center;
            border-radius: 30px;
            padding: 12px 20px;
            position: fixed;
            z-index: 5000;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            bottom: 90px;
            font-size: 15px;
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--card-border);
        }

        .toast.show {
            visibility: visible;
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* BẢNG ĐIỀU KHIỂN & CÀI ĐẶT */
        .modal-backdrop {
            display: none;
            position: fixed;
            z-index: 3000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .modal-backdrop.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background-color: var(--panel-bg);
            padding: 25px 20px;
            border-radius: 16px;
            width: 85%;
            max-width: 320px;
            text-align: center;
            border: 1px solid var(--card-border);
            transform: translateY(20px);
            transition: transform 0.2s;
        }

        .modal-backdrop.show .modal-content {
            transform: translateY(0);
        }

        .modal-content h3 {
            margin: 0 0 15px 0;
            font-size: 18px;
        }

        #chap-input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border-radius: 8px;
            border: 2px solid var(--card-border);
            background: var(--input-bg);
            color: var(--accent);
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
        }

        #chap-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-buttons button {
            flex: 1;
            font-size: 16px;
        }

        .btn-cancel {
            background-color: #475569;
        }

        .setting-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .setting-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            opacity: 0.8;
            font-weight: bold;
        }

        .flex-row {
            display: flex;
            gap: 10px;
            justify-content: space-between;
            align-items: center;
        }

        .flex-row button {
            flex: 1;
            min-height: 38px;
            font-size: 14px;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            color: var(--text-color);
        }

        .flex-row button.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(124, 58, 237, 0.1);
        }

        .val-display {
            font-weight: bold;
            width: 50px;
            text-align: center;
        }

        /* === FOCUS MODE === */
        body.focus-mode .section-title:not(.section-story),
        body.focus-mode .char-card,
        body.focus-mode .char-update,
        body.focus-mode .clue-item {
            display: none !important;
        }

        body.focus-mode .section-title.section-story {
            display: block !important;
        }

        @media (max-width: 600px) {
            #container {
                padding: 10px;
            }

            .nav-bar {
                position: fixed;
                top: auto;
                bottom: 0;
                left: 0;
                right: 0;
                width: 100%;
                border-radius: 0;
                margin: 0;
                padding: 10px 15px;
                border-top: 1px solid var(--card-border);
                border-left: none;
                border-right: none;
                border-bottom: none;
                padding-bottom: env(safe-area-inset-bottom, 10px);
            }

            #content-box {
                padding-bottom: 120px;
            }

            .btn-text {
                display: none;
            }

            button {
                min-width: 50px;
            }

            .fab-container {
                bottom: 75px;
                right: 15px;
            }

            .toast {
                bottom: 100px;
                width: 80%;
            }

            /* Ẩn tooltip trên mobile */
            .fab-item::before {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div id="progress-bar"></div>

    <!-- MỤC LỤC TRƯỢT -->
    <div id="sidebar">
        <div class="sidebar-header">
            <span>Mục lục</span>
            <button class="close-sidebar" onclick="toggleSidebar()">×</button>
        </div>
        <div class="sidebar-search">
            <input type="text" id="toc-search" placeholder="🔍 Tìm chương..." oninput="filterToc(this.value)">
        </div>
        <ul id="toc-list"></ul>
    </div>
    <div id="sidebar-overlay" class="modal-backdrop" onclick="toggleSidebar()"></div>

    <!-- FAB SPEED DIAL -->
    <div class="fab-overlay" id="fab-overlay" onclick="closeFab()"></div>
    <div class="fab-container">
        <button class="fab-main" id="fab-main" onclick="toggleFab()">⚙</button>
        <div class="fab-menu" id="fab-menu">
            <button class="fab-item" onclick="openSettings(); closeFab();" data-label="Cài đặt giao diện">Aa</button>
            <button class="fab-item" onclick="toggleSidebar(); closeFab();" data-label="Mục lục">☰</button>
            <button id="focus-btn" class="fab-item" onclick="toggleFocusMode(); closeFab();"
                data-label="Chế độ tập trung">👁</button>
            <button id="tts-btn" class="fab-item" onclick="toggleTTS(); closeFab();"
                data-label="Nghe truyện">🎧</button>
            <button id="autoscroll-btn" class="fab-item" onclick="toggleAutoScroll(); closeFab();"
                data-label="Cuộn tự động">⬇️</button>
            <button class="fab-item" onclick="window.scrollTo({top: 0, behavior: 'smooth'}); closeFab();"
                data-label="Lên đầu trang">⬆</button>
        </div>
    </div>

    <div id="container">
        <div class="nav-bar">
            <button onclick="changeChapter(-1)">❮ <span class="btn-text">Trước</span></button>
            <div class="nav-center">
                <button id="chap-btn" onclick="openChapModal()">
                    <span>Đang nạp...</span> <span>▾</span>
                </button>
            </div>
            <button onclick="changeChapter(1)"><span class="btn-text">Sau</span> ❯</button>
        </div>

        <div id="content-box">
            <div class="loading">Đang tải dữ liệu truyện...</div>
        </div>
        <!-- Loading spinner cho infinity scroll -->
        <div id="scroll-loading" class="scroll-loading">
            <span class="spinner"></span> Đang tải chương tiếp...
        </div>
        <!-- Điểm neo dùng để kích hoạt tải Infinity Scroll -->
        <div id="scroll-anchor" style="height: 50px; width: 100%;"></div>
    </div>

    <!-- Modals (Chuyển chương & Cài đặt) -->
    <div id="chap-modal" class="modal-backdrop" onclick="closeOutside(event, 'chap-modal')">
        <div class="modal-content">
            <h3>Chuyển đến chương</h3>
            <input type="number" id="chap-input" placeholder="VD: 1500" pattern="[0-9]*" inputmode="numeric">
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeModal('chap-modal')">Hủy</button>
                <button onclick="jumpToInputChapter()">Đi ngay</button>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal-backdrop" onclick="closeOutside(event, 'settings-modal')">
        <div class="modal-content">
            <h3>Tùy chỉnh Giao diện</h3>
            <div class="setting-group">
                <label>Cỡ chữ</label>
                <div class="flex-row">
                    <button onclick="changeFontSize(-2)">A-</button>
                    <span id="font-size-display" class="val-display">18px</span>
                    <button onclick="changeFontSize(2)">A+</button>
                </div>
            </div>
            <div class="setting-group">
                <label>Font chữ</label>
                <div class="flex-row" id="font-controls">
                    <button onclick="changeFont('sans-serif')" data-val="sans-serif">Hiện đại</button>
                    <button onclick="changeFont('serif')" data-val="serif">Sách giấy</button>
                </div>
            </div>
            <div class="setting-group">
                <label>Màu nền (Theme)</label>
                <div class="flex-row" id="theme-controls" style="flex-direction: column;">
                    <button style="width: 100%;" onclick="changeTheme('dark')" data-val="dark">🌙 Ban đêm</button>
                    <button style="width: 100%;" onclick="changeTheme('sepia')" data-val="sepia">📜 Sách cổ</button>
                    <button style="width: 100%;" onclick="changeTheme('oled')" data-val="oled">🔋 OLED Đen</button>
                    <button style="width: 100%;" onclick="changeTheme('purple')" data-val="purple">🔮 Tử Đằng</button>
                    <button style="width: 100%;" onclick="changeTheme('light')" data-val="light">☀️ Ban ngày</button>
                </div>
            </div>
            <div class="setting-group">
                <label>Tốc độ cuộn tự động (Px/Frame)</label>
                <div class="flex-row">
                    <button onclick="changeScrollSpeed(-0.5)">-</button>
                    <span id="speed-display" class="val-display">1.0</span>
                    <button onclick="changeScrollSpeed(0.5)">+</button>
                </div>
            </div>
            <div class="setting-group">
                <label>⚙️ Nguồn âm thanh (TTS Engine)</label>
                <select id="tts-engine-select" onchange="changeTTSEngine(this.value)"
                    style="width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--card-border);background:var(--input-bg);color:var(--text-color);font-size:14px;outline:none;cursor:pointer;margin-bottom:10px;">
                    <option value="system">Hệ thống (Mặc định - Ngắt khi ẩn app)</option>
                    <option value="google">Google API (Phát nền khi tắt màn hình)</option>
                </select>
                <label>🎤 Giọng đọc (chỉ áp dụng cho Hệ thống)</label>
                <select id="voice-select" onchange="selectVoice(this.value)"
                    style="width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--card-border);background:var(--input-bg);color:var(--text-color);font-size:14px;outline:none;cursor:pointer;"></select>
            </div>
            <div class="setting-group">
                <label>🔊 Tốc độ đọc TTS</label>
                <div class="flex-row">
                    <button onclick="changeTTSRate(-0.1)">-</button>
                    <span id="tts-rate-display" class="val-display">1.0</span>
                    <button onclick="changeTTSRate(0.1)">+</button>
                </div>
            </div>
            <button class="btn-cancel" style="width:100%; margin-top: 10px;"
                onclick="closeModal('settings-modal')">Đóng</button>
        </div>
    </div>

    <div id="toast" class="toast">Thông báo</div>

    <script>
        // PWA Caching Setup - Ép tải bản mới nhất bỏ qua cache
        if ('serviceWorker' in navigator) {
            let swUrl = 'sw.js?v=' + new Date().getTime();
            navigator.serviceWorker.register(swUrl).then(reg => {
                reg.onupdatefound = () => {
                    const installingWorker = reg.installing;
                    installingWorker.onstatechange = () => {
                        if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            showToast("Có bản cập nhật mới! Đang tải lại...", 3000);
                            setTimeout(() => window.location.reload(true), 1500);
                        }
                    };
                };
            }).catch(err => console.log('PWA SW err:', err));
        }

        let storyData = {};
        let availableChapters = [];
        let currentChapter = 1;
        let isLoadingNext = false;

        let cfg = {
            size: parseInt(localStorage.getItem('reader_size')) || 18,
            font: localStorage.getItem('reader_font') || 'sans-serif',
            theme: localStorage.getItem('reader_theme') || 'dark',
            speed: parseFloat(localStorage.getItem('reader_speed')) || 1.0,
            ttsRate: parseFloat(localStorage.getItem('reader_ttsRate')) || 1.0,
            ttsVoice: localStorage.getItem('reader_ttsVoice') || '',
            ttsEngine: localStorage.getItem('reader_ttsEngine') || (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent) ? 'google' : 'system')
        };

        function showToast(msg) {
            let toast = document.getElementById("toast");
            toast.textContent = msg;
            toast.className = "toast show";
            setTimeout(() => { toast.className = "toast"; }, 2500);
        }

        // --- CÀI ĐẶT ---
        function initSettings() {
            document.documentElement.style.setProperty('--font-size', cfg.size + 'px');
            document.getElementById('font-size-display').textContent = cfg.size + 'px';
            document.getElementById('speed-display').textContent = cfg.speed.toFixed(1);

            let fontStr = cfg.font === 'serif' ? 'Georgia, "Times New Roman", serif' : "-apple-system, BlinkMacSystemFont, sans-serif";
            document.documentElement.style.setProperty('--font-family', fontStr);
            document.documentElement.setAttribute('data-theme', cfg.theme);

            if (document.getElementById('tts-rate-display')) document.getElementById('tts-rate-display').textContent = cfg.ttsRate.toFixed(1);
            if (document.getElementById('tts-engine-select')) document.getElementById('tts-engine-select').value = cfg.ttsEngine;

            updateActiveButtons('font-controls', cfg.font);
            updateActiveButtons('theme-controls', cfg.theme);
        }
        function updateActiveButtons(id, val) {
            document.querySelectorAll(`#${id} button`).forEach(b => {
                b.classList.toggle('active', b.dataset.val === val);
            });
        }
        function changeFontSize(s) { cfg.size = Math.max(14, Math.min(30, cfg.size + s)); localStorage.setItem('reader_size', cfg.size); initSettings(); }
        function changeFont(t) { cfg.font = t; localStorage.setItem('reader_font', t); initSettings(); }
        function changeTheme(t) { cfg.theme = t; localStorage.setItem('reader_theme', t); initSettings(); }
        function changeScrollSpeed(s) { cfg.speed = Math.max(0.5, Math.min(5, cfg.speed + s)); localStorage.setItem('reader_speed', cfg.speed); initSettings(); }

        // --- FOCUS MODE ---
        let isFocusMode = false;
        function toggleFocusMode() {
            isFocusMode = !isFocusMode;
            document.body.classList.toggle('focus-mode', isFocusMode);
            document.getElementById('focus-btn').classList.toggle('active', isFocusMode);
            showToast(isFocusMode ? "Chế độ tập trung: BẬT" : "Chế độ tập trung: TẮT");
        }

        // --- OBSERVER ĐỂ CẬP NHẬT CHƯƠNG KHI CUỘN VÔ CỰC (Auto Bookmark) ---
        const chapterObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting && entry.intersectionRatio >= 0.3) {
                    let activeChap = parseInt(entry.target.dataset.chap);
                    currentChapter = activeChap;
                    updateChapBtn(activeChap);
                    localStorage.setItem('reader_last_chap', activeChap); // Lưu Auto-Bookmark
                    highlightToc(activeChap);
                }
            });
        }, { threshold: 0.3 }); // Kích hoạt khi 30% nội dung chương hiện trên màn hình

        // Cập nhật nút chương với tổng số chương
        function updateChapBtn(chap) {
            let total = availableChapters.length;
            let idx = availableChapters.indexOf(chap) + 1;
            document.getElementById('chap-btn').innerHTML = `<span>Chương ${chap} <span style="opacity:0.5;font-size:12px">(${idx}/${total})</span></span> <span>▾</span>`;
        }

        // --- INFINITY SCROLL ĐỂ TỰ ĐỘNG TẢI CHƯƠNG MỚI ---
        const endObserver = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && !isLoadingNext) {
                appendNextChapter();
            }
        }, { rootMargin: "0px 0px 500px 0px" }); // Bắt đầu tải khi còn cách đáy 500px

        function appendNextChapter() {
            let renderedDivs = document.querySelectorAll('.chapter-wrapper');
            if (renderedDivs.length === 0) return;

            let lastChap = parseInt(renderedDivs[renderedDivs.length - 1].dataset.chap);
            let nextIndex = availableChapters.indexOf(lastChap) + 1;

            if (nextIndex < availableChapters.length) {
                isLoadingNext = true;
                document.getElementById('scroll-loading').classList.add('visible');
                let nextChap = availableChapters[nextIndex];

                let div = document.createElement('div');
                div.className = 'chapter-wrapper';
                div.dataset.chap = nextChap;
                div.innerHTML = `<div class="chap-divider"><span>Chương ${nextChap}</span></div>` + parseAIContent(storyData[nextChap]);

                document.getElementById('content-box').appendChild(div);
                chapterObserver.observe(div); // Theo dõi thẻ div mới này

                setTimeout(() => {
                    isLoadingNext = false;
                    document.getElementById('scroll-loading').classList.remove('visible');
                }, 100);
            }
        }

        // --- LÕI TẢI TRUYỆN ---
        async function fetchStoryFile() {
            try {
                const response = await fetch('tom_tat_van_co_chi_ton.txt');
                if (!response.ok) throw new Error("Lỗi");
                parseFullText(await response.text());
            } catch (e) {
                document.getElementById('content-box').innerHTML = `<div class="loading">Lỗi: Không tìm thấy file <b>tom_tat_van_co_chi_ton.txt</b>.</div>`;
            }
        }

        // --- MỤC LỤC VỚI NHÓM CHƯƠNG ---
        const GROUP_SIZE = 50;

        function buildToc() {
            let html = '';
            if (availableChapters.length > GROUP_SIZE) {
                // Nhóm chương
                let groups = {};
                availableChapters.forEach(c => {
                    let groupIdx = Math.floor((c - 1) / GROUP_SIZE);
                    let start = groupIdx * GROUP_SIZE + 1;
                    let end = Math.min(start + GROUP_SIZE - 1, availableChapters[availableChapters.length - 1]);
                    let key = `${start}-${end}`;
                    if (!groups[key]) groups[key] = [];
                    groups[key].push(c);
                });
                for (let key in groups) {
                    html += `<div class="toc-group-header" onclick="toggleTocGroup(this)"><span>Chương ${key}</span><span class="arrow">▼</span></div>`;
                    html += `<div class="toc-group" style="max-height: 9999px;">`;
                    groups[key].forEach(c => {
                        html += `<li class="toc-item" data-id="${c}" onclick="loadChapter(${c}); toggleSidebar();">Chương ${c}</li>`;
                    });
                    html += `</div>`;
                }
            } else {
                availableChapters.forEach(c => {
                    html += `<li class="toc-item" data-id="${c}" onclick="loadChapter(${c}); toggleSidebar();">Chương ${c}</li>`;
                });
            }
            document.getElementById('toc-list').innerHTML = html;
        }

        function toggleTocGroup(header) {
            header.classList.toggle('collapsed');
            let group = header.nextElementSibling;
            group.classList.toggle('collapsed');
        }

        function filterToc(query) {
            query = query.trim();
            let items = document.querySelectorAll('.toc-item');
            let groups = document.querySelectorAll('.toc-group');
            let headers = document.querySelectorAll('.toc-group-header');

            if (!query) {
                items.forEach(el => el.style.display = '');
                groups.forEach(el => el.style.display = '');
                headers.forEach(el => el.style.display = '');
                return;
            }

            items.forEach(el => {
                let match = el.textContent.includes(query) || el.dataset.id === query;
                el.style.display = match ? '' : 'none';
            });

            // Ẩn nhóm nếu không có item nào hiển thị
            groups.forEach((group, i) => {
                let hasVisible = Array.from(group.querySelectorAll('.toc-item')).some(el => el.style.display !== 'none');
                group.style.display = hasVisible ? '' : 'none';
                if (headers[i]) headers[i].style.display = hasVisible ? '' : 'none';
                // Mở nhóm khi tìm kiếm
                if (hasVisible) {
                    group.classList.remove('collapsed');
                    if (headers[i]) headers[i].classList.remove('collapsed');
                }
            });
        }

        function highlightToc(chap) {
            document.querySelectorAll('.toc-item').forEach(el => el.classList.remove('active'));
            let activeItem = document.querySelector(`.toc-item[data-id="${chap}"]`);
            if (activeItem) {
                activeItem.classList.add('active');
                activeItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function parseFullText(text) {
            const parts = text.split(/---\s*(?:CHƯƠNG|CHUONG)\s+(\d+)\s*---/i);
            for (let i = 1; i < parts.length; i += 2) {
                let cNum = parseInt(parts[i]);
                storyData[cNum] = parts[i + 1];
                availableChapters.push(cNum);
            }
            availableChapters.sort((a, b) => a - b);

            if (availableChapters.length > 0) {
                buildToc();
                // Đọc Auto-Bookmark
                let savedChap = parseInt(localStorage.getItem('reader_last_chap'));
                if (savedChap && availableChapters.includes(savedChap)) {
                    loadChapter(savedChap);
                    showToast(`Tiếp tục đọc từ Chương ${savedChap}`);
                } else {
                    loadChapter(availableChapters[0]);
                }
                endObserver.observe(document.getElementById('scroll-anchor'));
            } else {
                document.getElementById('content-box').innerHTML = '<div class="loading">File rỗng!</div>';
            }
        }

        function parseAIContent(rawText) {
            let lines = rawText.split('\n'); let html = '';
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (!line) continue;
                if (line.includes('[DIỄN BIẾN CHÍNH]') || line.includes('[DIEN BIEN CHINH]')) html += '<div class="section-title section-story">📜 Diễn Biến Chính</div>';
                else if (line.includes('[HỒ SƠ TÌNH TRẠNG & TIẾN HÓA]') || line.includes('[HO SO TINH TRANG & TIEN HOA]')) html += '<div class="section-title">👤 Hồ Sơ Nhân Vật</div>';
                else if (line.includes('[MANH MỐI & BÍ ẨN]') || line.includes('[MANH MOI & BI AN]')) html += '<div class="section-title">🔍 Manh Mối & Bí Ẩn</div>';
                else if (line.startsWith('- ')) {
                    let p = line.substring(2).split('|').map(s => s.trim());
                    let thanPhan = p[1] ? `<span class="badge">👤 ${p[1].replace(/(Thân phận|Than phan):\s*/i, '')}</span>` : '';
                    let tuvi = p[2] ? `<span class="badge tuvi">⚔ ${p[2].replace(/(Tu vi):\s*/i, '')}</span>` : '';
                    let statusText = p[3] ? p[3].replace(/(Trạng thái|Trang thai):\s*/i, '') : '';
                    let statusClass = statusText.includes('Chết') ? 'badge dead' : 'badge status';
                    let statusIcon = statusText.includes('Chết') ? '💀' : '❤';
                    let st = statusText ? `<span class="${statusClass}">${statusIcon} ${statusText}</span>` : '';
                    html += `<details class="char-card"><summary class="char-main"><span class="char-name">${p[0] || 'Vô danh'}</span> ${thanPhan} ${tuvi} ${st}</summary>`;
                    if (i + 1 < lines.length && (lines[i + 1].includes('↳') || lines[i + 1].includes('CẬP NHẬT') || lines[i + 1].includes('CAP NHAT'))) {
                        html += `<div class="char-update"><b>⚡ Cập nhật:</b> ${lines[++i].replace(/↳|⚠|CẬP NHẬT:|->|CAP NHAT:/gi, '').trim()}</div>`;
                    } else html += `<div class="char-update">Không có ghi nhận mới.</div>`;
                    html += `</details>`;
                }
                else if (line.startsWith('✦') || line.startsWith('* ')) html += `<div class="clue-item"><span class="clue-icon">✦</span> ${line.substring(1).trim()}</div>`;
                else if (!line.includes('↳') && !line.includes('CẬP NHẬT:') && !line.includes('CAP NHAT:')) {
                    html += `<p class="story-text">${line.replace(/(Lý Vân Tiêu)/g, '<span class="highlight">$1</span>')}</p>`;
                }
            }
            return html;
        }

        // Load dứt điểm 1 chương (xóa sạch nội dung cũ - Dùng khi nhảy cóc hoặc bấm nút Next/Prev)
        function loadChapter(chapNum) {
            chapNum = parseInt(chapNum);
            if (storyData[chapNum]) {
                let cBox = document.getElementById('content-box');

                // Smooth page transition
                let oldWrappers = cBox.querySelectorAll('.chapter-wrapper');
                if (oldWrappers.length > 0) {
                    oldWrappers.forEach(el => {
                        chapterObserver.unobserve(el);
                        el.classList.add('fade-out');
                    });

                    setTimeout(() => {
                        renderNewChapter(chapNum, cBox);
                    }, 250);
                } else {
                    renderNewChapter(chapNum, cBox);
                }
            }
        }

        function renderNewChapter(chapNum, cBox) {
            currentChapter = chapNum;

            let div = document.createElement('div');
            div.className = 'chapter-wrapper';
            div.dataset.chap = chapNum;
            div.innerHTML = `<div class="chap-divider"><span>Chương ${chapNum}</span></div>` + parseAIContent(storyData[chapNum]);

            cBox.innerHTML = '';
            cBox.appendChild(div);

            chapterObserver.observe(div);
            localStorage.setItem('reader_last_chap', chapNum);

            updateChapBtn(chapNum);
            highlightToc(chapNum);
            window.scrollTo({ top: 0, behavior: 'auto' });
        }

        function changeChapter(step) {
            let nextIndex = availableChapters.indexOf(currentChapter) + step;
            if (nextIndex >= 0 && nextIndex < availableChapters.length) {
                loadChapter(availableChapters[nextIndex]);
            } else {
                showToast(step > 0 ? "Đã đến chương cuối!" : "Đây là chương đầu!");
            }
        }

        function jumpToInputChapter() {
            let targetNum = parseInt(document.getElementById('chap-input').value);
            if (!targetNum || targetNum < 1) return;
            if (availableChapters.includes(targetNum)) loadChapter(targetNum);
            else {
                let nearest = availableChapters.reduce((prev, curr) => Math.abs(curr - targetNum) < Math.abs(prev - targetNum) ? curr : prev);
                showToast(`Bắt vào chương gần nhất: ${nearest}`); loadChapter(nearest);
            }
            closeModal('chap-modal');
        }

        // --- CÁC TÍNH NĂNG TƯƠNG TÁC (Scroll, Swipe, TTS) ---
        window.onscroll = function () {
            let winScroll = document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            document.getElementById("progress-bar").style.width = (winScroll / height) * 100 + "%";
        };

        // FAB Speed Dial
        function toggleFab() {
            let main = document.getElementById('fab-main');
            let menu = document.getElementById('fab-menu');
            let overlay = document.getElementById('fab-overlay');
            let isOpen = main.classList.toggle('open');
            menu.classList.toggle('open', isOpen);
            overlay.classList.toggle('show', isOpen);
        }
        function closeFab() {
            document.getElementById('fab-main').classList.remove('open');
            document.getElementById('fab-menu').classList.remove('open');
            document.getElementById('fab-overlay').classList.remove('show');
        }

        // Auto Scroll
        let isAutoScrolling = false; let scrollReq;
        function toggleAutoScroll() {
            isAutoScrolling = !isAutoScrolling;
            document.getElementById('autoscroll-btn').classList.toggle('active', isAutoScrolling);
            if (isAutoScrolling) { showToast("Bật cuộn tự động"); autoScrollStep(); }
            else { cancelAnimationFrame(scrollReq); }
        }
        function autoScrollStep() {
            window.scrollBy(0, cfg.speed);
            scrollReq = requestAnimationFrame(autoScrollStep);
        }
        // Dừng cuộn khi người dùng chạm vào màn hình
        document.addEventListener('touchstart', () => { if (isAutoScrolling) toggleAutoScroll(); }, { passive: true });
        document.addEventListener('mousedown', (e) => { if (isAutoScrolling && e.target.tagName !== 'BUTTON') toggleAutoScroll(); });

        // ==========================================
        // TÍNH NĂNG TTS (ĐỌC TRUYỆN - FIX MOBILE)
        // ==========================================
        let synth = window.speechSynthesis;
        let googleAudio = new Audio(); // HTML5 Audio cho chạy nền
        let isSpeaking = false;
        let ttsQueue = [];
        let viVoice = null;
        let ttsKeepAlive = null;
        let ttsErrorCount = 0;
        let ttsCurrentChapter = 0;
        const TTS_MAX_ERRORS = 5;
        const TTS_MOBILE_CHUNK = 400; // Chunk lớn hơn để giảm số lần ngắt quãng giữa các đoạn
        const TTS_DESKTOP_CHUNK = 400;
        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        let ttsTimeout = null;
        let ttsMonitor = null; // Polling monitor cho mobile

        // 1. Tìm giọng Tiếng Việt - ưu tiên giọng hệ thống (local) thay vì Google
        function loadVoices() {
            let voices = synth.getVoices();
            if (voices.length === 0) return;

            // Lọc giọng Việt
            let viVoices = voices.filter(v => v.lang === 'vi-VN' || v.lang.startsWith('vi') || v.name.toLowerCase().includes('vietnamese'));
            // Lấy tất cả giọng để hiện trong dropdown
            let allVoices = voices;

            // Populate dropdown chọn giọng
            let select = document.getElementById('voice-select');
            if (select) {
                select.innerHTML = '';
                // Nhóm giọng Việt lên đầu
                if (viVoices.length > 0) {
                    let optGroup = document.createElement('optgroup');
                    optGroup.label = '🇻🇳 Giọng Tiếng Việt';
                    viVoices.forEach(v => {
                        let opt = document.createElement('option');
                        opt.value = v.name;
                        opt.textContent = `${v.name} ${v.localService ? '(Hệ thống)' : '(Online)'}`;
                        optGroup.appendChild(opt);
                    });
                    select.appendChild(optGroup);
                }
                // Nhóm giọng khác
                let otherVoices = allVoices.filter(v => !viVoices.includes(v));
                if (otherVoices.length > 0) {
                    let optGroup2 = document.createElement('optgroup');
                    optGroup2.label = '🌐 Giọng khác';
                    otherVoices.forEach(v => {
                        let opt = document.createElement('option');
                        opt.value = v.name;
                        opt.textContent = `${v.name} [${v.lang}]`;
                        optGroup2.appendChild(opt);
                    });
                    select.appendChild(optGroup2);
                }
            }

            // Chọn giọng đã lưu hoặc giọng mặc định
            let savedVoiceName = cfg.ttsVoice;
            if (savedVoiceName) {
                let savedVoice = voices.find(v => v.name === savedVoiceName);
                if (savedVoice) {
                    viVoice = savedVoice;
                    if (select) select.value = savedVoiceName;
                    console.log('TTS: Dùng giọng đã lưu:', viVoice.name);
                    return;
                }
            }

            if (viVoices.length > 0) {
                // Ưu tiên giọng hệ thống (localService = true) thay vì giọng Google online
                let localViVoice = viVoices.find(v => v.localService === true);
                viVoice = localViVoice || viVoices[0];
                console.log('TTS: Dùng giọng Việt:', viVoice.name, '| Local:', viVoice.localService);
            } else {
                // Không có giọng Việt, dùng giọng mặc định hệ thống
                viVoice = voices.find(v => v.default) || voices[0];
                console.log('TTS: Không tìm thấy giọng Việt, dùng giọng:', viVoice?.name);
            }

            if (select && viVoice) select.value = viVoice.name;

            // Log tất cả giọng Việt để debug
            console.log('TTS: Tất cả giọng Việt tìm thấy:', viVoices.map(v => `${v.name} (local: ${v.localService})`));
        }

        function selectVoice(voiceName) {
            let voices = synth.getVoices();
            let selected = voices.find(v => v.name === voiceName);
            if (selected) {
                viVoice = selected;
                cfg.ttsVoice = voiceName;
                localStorage.setItem('reader_ttsVoice', voiceName);
                showToast(`Đã chọn giọng: ${voiceName}`);
                console.log('TTS: Chuyển sang giọng:', viVoice.name, '| Lang:', viVoice.lang);
            }
        }

        function changeTTSRate(delta) {
            cfg.ttsRate = Math.max(0.5, Math.min(2.0, Math.round((cfg.ttsRate + delta) * 10) / 10));
            localStorage.setItem('reader_ttsRate', cfg.ttsRate);
            document.getElementById('tts-rate-display').textContent = cfg.ttsRate.toFixed(1);
        }

        function changeTTSEngine(engine) {
            cfg.ttsEngine = engine;
            localStorage.setItem('reader_ttsEngine', engine);
            showToast(engine === 'google' ? "Đã đổi sang Google (Hỗ trợ chạy nền)" : "Đã đổi sang Hệ thống");
            if (isSpeaking) stopTTS();
        }

        // Chrome load giọng bất đồng bộ, cần thử lại nhiều lần
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }
        loadVoices();
        // Thử lại sau 500ms phòng trường hợp voice chưa load kịp
        setTimeout(loadVoices, 500);
        setTimeout(loadVoices, 1500);
        // Init TTS rate display
        setTimeout(() => {
            let rateDisp = document.getElementById('tts-rate-display');
            if (rateDisp) rateDisp.textContent = cfg.ttsRate.toFixed(1);
        }, 100);

        // 2. Workaround cho bug Chrome Desktop: tự pause speech sau ~15s
        // CHỈ áp dụng cho Desktop - trên Mobile pause/resume gây phản tác dụng
        function startKeepAlive() {
            stopKeepAlive();
            if (isMobile) return; // KHÔNG dùng keep-alive trên mobile
            ttsKeepAlive = setInterval(() => {
                if (synth.speaking && !synth.paused) {
                    synth.pause();
                    synth.resume();
                }
            }, 10000);
        }

        function stopKeepAlive() {
            if (ttsKeepAlive) {
                clearInterval(ttsKeepAlive);
                ttsKeepAlive = null;
            }
            if (ttsTimeout) {
                clearTimeout(ttsTimeout);
                ttsTimeout = null;
            }
        }

        // Chuẩn bị text cho 1 chương để đọc TTS
        function prepareChapterTTS(chapNum) {
            let chapterTitle = `Chương ${chapNum}.`;

            let activeWrap = document.querySelector(`.chapter-wrapper[data-chap="${chapNum}"]`);
            if (!activeWrap) {
                let raw = storyData[chapNum];
                if (!raw) return '';
                let lines = raw.split('\n');
                let texts = [];
                for (let line of lines) {
                    line = line.trim();
                    if (!line) continue;
                    if (line.includes('[DIỄN BIẾN CHÍNH]') || line.includes('[DIEN BIEN CHINH]')) continue;
                    if (line.includes('[HỒ SƠ') || line.includes('[HO SO')) continue;
                    if (line.includes('[MANH MỐI') || line.includes('[MANH MOI')) continue;
                    if (line.startsWith('- ')) continue;
                    if (line.startsWith('✦') || line.startsWith('* ')) continue;
                    if (line.includes('↳') || line.includes('CẬP NHẬT:') || line.includes('CAP NHAT:')) continue;
                    texts.push(line);
                }
                return chapterTitle + ' ' + texts.join('. ');
            }

            let textElements = activeWrap.querySelectorAll('.story-text');
            let storyText = Array.from(textElements).map(p => p.innerText).join('. ');
            return chapterTitle + ' ' + storyText;
        }

        function cleanTextForTTS(rawText) {
            return rawText
                // Loại bỏ emoji/icon
                .replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F1E0}-\u{1F1FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{FE00}-\u{FE0F}\u{1F900}-\u{1F9FF}\u{200D}\u{20E3}\u{E0020}-\u{E007F}]/gu, '')
                .replace(/[✦⚡👤⚔❤💀📜🔍🔮☀️🌙🔋▼▲▾❮❯☰🎧⬇️⬆⚠️✱]/gu, '')
                // Dấu gạch ngang dài → dấu phẩy (để TTS ngắt nhị nhẹ thay vì ngắt câu)
                .replace(/\s*[—–]+\s*/g, ', ')
                .replace(/\s+-\s+/g, ', ')
                .replace(/(?<=[a-zA-ZÀ-ỹ])-(?=[a-zA-ZÀ-ỹ])/g, ' ')
                // Dấu hai chấm, chấm phẩy → dấu phẩy (ngắt nhị, không ngắt câu)
                .replace(/:/g, ',')
                .replace(/;/g, ',')
                .replace(/\.{3,}/g, '.')
                .replace(/\|/g, ', ')
                .replace(/CẬP NHẬT:|CAP NHAT:/g, '')
                .replace(/\n/g, ' ')
                .replace(/\*+/g, '')
                .replace(/,{2,}/g, ',')
                .replace(/\s{2,}/g, ' ')
                .trim();
        }

        // Chunking thông minh: ghép các câu ngắn thành chunk lớn, chỉ tách tại ranh giới câu
        function chunkText(cleanText) {
            // Google API giới hạn ~200 ký tự mỗi request
            let maxLen = (cfg.ttsEngine === 'google') ? 180 : (isMobile ? TTS_MOBILE_CHUNK : TTS_DESKTOP_CHUNK);
            // Tách theo câu (dấu chấm + khoảng trắng hoặc cuối chuỗi)
            let sentences = cleanText.match(/[^.!?]+[.!?]+/g) || [cleanText];
            let queue = [];
            let current = '';

            sentences.forEach(s => {
                s = s.trim();
                if (!s || s.length <= 1) return;

                // Nếu thêm câu này vào mà vẫn vừa maxLen, ghép lại
                if ((current + ' ' + s).trim().length <= maxLen) {
                    current = (current + ' ' + s).trim();
                } else {
                    // Push chunk hiện tại nếu có
                    if (current.length > 2) queue.push(current);
                    // Nếu câu quá dài, cắt theo dấu phẩy
                    if (s.length > maxLen) {
                        let parts = s.split(',');
                        let sub = '';
                        parts.forEach(p => {
                            p = p.trim();
                            if ((sub + ', ' + p).trim().length <= maxLen) {
                                sub = (sub ? sub + ', ' : '') + p;
                            } else {
                                if (sub.length > 2) queue.push(sub);
                                sub = p;
                            }
                        });
                        if (sub.length > 2) current = sub;
                        else current = '';
                    } else {
                        current = s;
                    }
                }
            });
            if (current.length > 2) queue.push(current);

            return queue;
        }

        function toggleTTS() {
            let btn = document.getElementById('tts-btn');

            if (isSpeaking) {
                stopTTS();
                return;
            }

            // WARM-UP cho Google Audio: Ép trình duyệt cấp quyền phát âm thanh ngay lập tức
            // từ thao tác chạm của người dùng để không bị lỗi Autoplay Blocked
            if (cfg.ttsEngine === 'google') {
                googleAudio.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=';
                googleAudio.play().catch(() => { });
            }

            let rawText = prepareChapterTTS(currentChapter);
            if (!rawText || !rawText.trim()) { showToast("Chương này không có văn bản!"); return; }

            if (cfg.ttsEngine === 'system') {
                if (!viVoice) {
                    loadVoices();
                    if (!viVoice) {
                        showToast("Trình duyệt chưa hỗ trợ đọc giọng nói! Chuyển sang Google API...");
                        cfg.ttsEngine = 'google';
                        document.getElementById('tts-engine-select').value = 'google';
                    }
                }
            }

            let cleanText = cleanTextForTTS(rawText);
            ttsQueue = chunkText(cleanText);

            if (ttsQueue.length === 0) { showToast("Không có nội dung để đọc!"); return; }

            isSpeaking = true;
            ttsCurrentChapter = currentChapter;
            ttsErrorCount = 0;
            btn.classList.add('active');

            synth.cancel();

            // Khởi tạo audio session để phát ngầm trên mobile
            initAudioSession();

            showToast(`Đang đọc Chương ${currentChapter}`);
            startKeepAlive();
            playNextTTSChunk();
        }

        function stopTTS() {
            synth.cancel();
            googleAudio.pause();
            googleAudio.src = '';
            stopKeepAlive();
            stopAudioSession();
            if (ttsMonitor) { clearInterval(ttsMonitor); ttsMonitor = null; }
            if (ttsTimeout) { clearTimeout(ttsTimeout); ttsTimeout = null; }
            isSpeaking = false;
            ttsQueue = [];
            ttsCurrentChapter = 0;
            ttsErrorCount = 0;
            document.getElementById('tts-btn').classList.remove('active');
            showToast("Đã tắt âm thanh");
        }

        // === AUDIO SESSION: Giữ audio sống khi màn hình tắt / app ẩn ===
        let silentAudio = null;

        function initAudioSession() {
            stopAudioSession();

            // Tạo âm thanh im lặng bằng Web Audio API
            try {
                let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                // Tạo 1 giây âm thanh im lặng
                let buffer = audioCtx.createBuffer(1, audioCtx.sampleRate, audioCtx.sampleRate);
                let source = audioCtx.createBufferSource();
                source.buffer = buffer;
                source.connect(audioCtx.destination);
                source.start();
            } catch (e) {
                console.log('AudioContext init failed:', e);
            }

            // Tạo thẻ audio với data URI im lặng, loop vô hạn
            // Điều này giữ audio session sống trên mobile
            try {
                silentAudio = new Audio('data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=');
                silentAudio.loop = true;
                silentAudio.volume = 0.01; // Gần như im lặng
                silentAudio.play().catch(() => { });
            } catch (e) {
                console.log('Silent audio init failed:', e);
            }

            // Media Session API - hiển thị trên màn hình khóa
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: `Chương ${ttsCurrentChapter}`,
                    artist: 'AI Summary Reader',
                    album: 'Vạn Cổ Chí Tôn'
                });
                navigator.mediaSession.setActionHandler('pause', () => stopTTS());
                navigator.mediaSession.setActionHandler('play', () => {
                    if (!isSpeaking) toggleTTS();
                });
            }
        }

        function stopAudioSession() {
            if (silentAudio) {
                silentAudio.pause();
                silentAudio.src = '';
                silentAudio = null;
            }
        }

        // Tự động chuyển sang chương tiếp theo khi đọc xong
        function ttsNextChapter() {
            let nextIndex = availableChapters.indexOf(ttsCurrentChapter) + 1;
            if (nextIndex < availableChapters.length) {
                let nextChap = availableChapters[nextIndex];
                ttsCurrentChapter = nextChap;

                // Chuyển màn hình sang chương mới
                loadChapter(nextChap);

                // Chuẩn bị text cho chương mới
                // Delay nhỏ để DOM render xong
                setTimeout(() => {
                    let rawText = prepareChapterTTS(nextChap);
                    if (!rawText || !rawText.trim()) {
                        showToast(`Chương ${nextChap} không có nội dung, bỏ qua...`);
                        ttsNextChapter();
                        return;
                    }
                    let cleanText = cleanTextForTTS(rawText);
                    ttsQueue = chunkText(cleanText);
                    showToast(`Tự động đọc Chương ${nextChap}`);
                    playNextTTSChunk();
                }, 500);
            } else {
                // Hết truyện
                stopTTS();
                showToast("Đã đọc hết toàn bộ truyện!");
            }
        }

        function playNextTTSChunk() {
            if (!isSpeaking) return;

            // Clear timers cũ
            if (ttsTimeout) { clearTimeout(ttsTimeout); ttsTimeout = null; }
            if (ttsMonitor) { clearInterval(ttsMonitor); ttsMonitor = null; }

            if (ttsQueue.length === 0) {
                ttsNextChapter();
                return;
            }

            if (ttsErrorCount >= TTS_MAX_ERRORS) {
                showToast("TTS gặp quá nhiều lỗi, đã dừng.");
                stopTTS();
                return;
            }

            let chunk = ttsQueue.shift();
            let chunkHandled = false;

            if (cfg.ttsEngine === 'google') {
                // ====== GOOGLE TTS (AUDIO TAG - HỖ TRỢ CHẠY NỀN) ======
                let url = `https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=vi&q=${encodeURIComponent(chunk)}`;
                googleAudio.src = url;
                googleAudio.playbackRate = cfg.ttsRate;

                googleAudio.onended = () => {
                    if (chunkHandled) return;
                    chunkHandled = true;
                    ttsErrorCount = 0;
                    if (isSpeaking) {
                        setTimeout(() => { if (isSpeaking) playNextTTSChunk(); }, 50);
                    }
                };

                googleAudio.onerror = (e) => {
                    if (chunkHandled) return;
                    chunkHandled = true;
                    console.error("Lỗi Google TTS:", e);
                    ttsErrorCount++;
                    if (isSpeaking) {
                        setTimeout(() => { if (isSpeaking) playNextTTSChunk(); }, 500);
                    }
                };

                googleAudio.play().catch(e => {
                    console.error("Play block:", e);
                    if (!chunkHandled) {
                        chunkHandled = true;
                        setTimeout(() => { if (isSpeaking) playNextTTSChunk(); }, 500);
                    }
                });

            } else {
                // ====== SYSTEM TTS (SPEECH SYNTHESIS - BỊ NGẮT KHI ẨN APP) ======
                let utterance = new SpeechSynthesisUtterance(chunk);
                utterance.lang = viVoice ? viVoice.lang : 'vi-VN';
                utterance.rate = cfg.ttsRate;
                if (viVoice) utterance.voice = viVoice;

                utterance.onend = () => {
                    if (chunkHandled) return;
                    chunkHandled = true;
                    ttsErrorCount = 0;
                    if (ttsTimeout) { clearTimeout(ttsTimeout); ttsTimeout = null; }
                    if (isSpeaking) {
                        setTimeout(() => { if (isSpeaking) playNextTTSChunk(); }, 50);
                    }
                };

                utterance.onerror = (e) => {
                    if (chunkHandled) return;
                    if (e.error === 'interrupted' || e.error === 'canceled') return;
                    chunkHandled = true;
                    console.error("Lỗi TTS:", e.error, chunk.substring(0, 50));
                    ttsErrorCount++;
                    if (ttsTimeout) { clearTimeout(ttsTimeout); ttsTimeout = null; }
                    if (isSpeaking) {
                        setTimeout(() => { if (isSpeaking) playNextTTSChunk(); }, 300);
                    }
                };

                synth.speak(utterance);

                if (isMobile) {
                    let estimatedMs = Math.max(5000, (chunk.length / cfg.ttsRate) * 85 + 3000);
                    ttsTimeout = setTimeout(() => {
                        if (!chunkHandled && isSpeaking) {
                            console.log('TTS Mobile: onend không fire, kích hoạt fallback chuyển chunk');
                            chunkHandled = true;
                            synth.cancel();
                            setTimeout(() => { if (isSpeaking) playNextTTSChunk(); }, 200);
                        }
                    }, estimatedMs);
                }
            }
        }

        // Gestures (Vuốt) - không vuốt khi TTS đang đọc
        let touchStartX = 0; let touchEndX = 0;
        document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
        document.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            if (!isSpeaking && !document.querySelector('.modal-backdrop.show') && !document.getElementById('sidebar').classList.contains('open')) {
                if (touchEndX < touchStartX - 100) changeChapter(1);
                if (touchEndX > touchStartX + 100) changeChapter(-1);
            }
        }, { passive: true });

        // Modals & Sidebar
        function openChapModal() { document.getElementById('chap-modal').classList.add('show'); setTimeout(() => { document.getElementById('chap-input').focus(); }, 100); }
        function openSettings() { document.getElementById('settings-modal').classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }
        function closeOutside(e, id) { if (e.target.id === id) closeModal(id); }
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebar-overlay').classList.toggle('show');
        }
        document.getElementById('chap-input').addEventListener('keypress', e => { if (e.key === 'Enter') jumpToInputChapter(); });

        window.onload = () => { initSettings(); fetchStoryFile(); };
    </script>
</body>

</html>
