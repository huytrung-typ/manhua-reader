<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Summary Reader</title>
    <style>
        :root {
            --bg-color: #0f111a; --text-color: #e2e8f0; --panel-bg: #1e2130;
            --accent: #7c3aed; --accent-hover: #6d28d9;
            --update-bg: rgba(234, 179, 8, 0.15); --update-border: #eab308;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
            line-height: 1.7; font-size: 17px;
        }
        #container { width: 100%; max-width: 800px; padding: 20px; box-sizing: border-box; }
        .nav-bar {
            display: flex; justify-content: space-between; align-items: center;
            background-color: var(--panel-bg); padding: 15px 20px; border-radius: 12px; margin-top: 10px;
            position: sticky; top: 10px; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.4); border: 1px solid #2a2e42;
        }
        button {
            background-color: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 8px;
            font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        button:hover { background-color: var(--accent-hover); transform: translateY(-1px); }
        select {
            padding: 6px 10px; border-radius: 6px; border: 1px solid #474d66;
            background: #141621; color: white; text-align: center; font-weight: bold;
            font-size: 16px; cursor: pointer; outline: none;
        }
        select:focus { border-color: var(--accent); }
        select option { background: #1e2130; }

        #content-box { margin-top: 30px; padding-bottom: 100px; }
        .section-title {
            color: #38bdf8; font-size: 20px; font-weight: bold; text-transform: uppercase; margin: 40px 0 15px 0;
            padding-bottom: 8px; border-bottom: 2px solid #1e293b; display: flex; align-items: center; gap: 8px;
        }
        .story-text { color: #cbd5e1; text-align: justify; margin-bottom: 15px; font-size: 1.05em; }
        .char-card { background: #1e2433; border-radius: 10px; margin-bottom: 15px; border: 1px solid #2d3748; overflow: hidden; }
        .char-main { padding: 12px 16px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .char-name { font-weight: bold; color: #f8fafc; font-size: 1.1em; margin-right: 10px; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.85em; font-weight: 600; background: #334155; color: #94a3b8; border: 1px solid #475569; }
        .badge.tuvi { background: rgba(56, 189, 248, 0.1); color: #38bdf8; border-color: rgba(56, 189, 248, 0.3); }
        .badge.status { background: rgba(34, 197, 94, 0.1); color: #4ade80; border-color: rgba(34, 197, 94, 0.3); }
        .char-update { background: var(--update-bg); padding: 10px 16px; border-top: 1px dashed rgba(234, 179, 8, 0.3); border-left: 4px solid var(--update-border); color: #fde047; font-size: 0.95em; }
        .char-update b { color: #facc15; margin-right: 5px; }
        .clue-item { background: #1e1e2d; padding: 12px 16px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid #ec4899; color: #e2e8f0; }
        .clue-item span { color: #ec4899; margin-right: 8px; font-weight: bold; }
        .loading { color: #888; font-style: italic; text-align: center; margin-top: 50px; }
        .toast {
            visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center;
            border-radius: 8px; padding: 12px; position: fixed; z-index: 1000; left: 50%; transform: translateX(-50%);
            bottom: 30px; font-size: 15px; opacity: 0; transition: opacity 0.3s;
        }
        .toast.show { visibility: visible; opacity: 1; }
    </style>
</head>
<body>
    <div id="container">
        <div class="nav-bar">
            <button onclick="changeChapter(-1)">❮ Trước</button>
            <div>
                Chương 
                <select id="chap-select" onchange="loadChapter(this.value)">
                    <option value="1">Đang nạp file...</option>
                </select>
            </div>
            <button onclick="changeChapter(1)">Sau ❯</button>
        </div>
        <div id="content-box">
            <div class="loading">Đang tải file truyện từ máy chủ... Hãy chờ giây lát.</div>
        </div>
    </div>
    <div id="toast" class="toast">Thông báo</div>

    <script>
        let storyData = {}; 
        let availableChapters = [];
        let currentChapter = 1;

        function showToast(msg) {
            let toast = document.getElementById("toast");
            toast.textContent = msg;
            toast.className = "toast show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        }

        // Tải toàn bộ file text 1 lần duy nhất khi mở web
        async function fetchStoryFile() {
            try {
                // Tên file .txt của bạn (phải để cùng thư mục với index.html)
                const response = await fetch('tom_tat_van_co_chi_ton.txt');
                if (!response.ok) throw new Error("Không tìm thấy file truyện");
                
                const fullText = await response.text();
                parseFullText(fullText);
            } catch (e) {
                document.getElementById('content-box').innerHTML = 
                    `<div class="loading" style="color: #ef4444;">Lỗi: Không tìm thấy file <b>tom_tat_van_co_chi_ton.txt</b>.<br>Đảm bảo file này đã được đẩy lên GitHub cùng với index.html</div>`;
            }
        }

        // Cắt nhỏ file text thành từng chương và lưu vào RAM (biến storyData)
        function parseFullText(text) {
            // Cắt theo chữ "--- CHƯƠNG X ---"
            const parts = text.split(/---\s*CHƯƠNG\s+(\d+)\s*---/);
            
            for (let i = 1; i < parts.length; i += 2) {
                let chapNum = parseInt(parts[i]);
                let chapContent = parts[i+1];
                storyData[chapNum] = chapContent;
                availableChapters.push(chapNum);
            }

            availableChapters.sort((a, b) => a - b);

            if (availableChapters.length > 0) {
                const selectEl = document.getElementById('chap-select');
                selectEl.innerHTML = ''; 
                
                availableChapters.forEach(chap => {
                    let opt = document.createElement('option');
                    opt.value = chap;
                    opt.textContent = chap;
                    selectEl.appendChild(opt);
                });

                loadChapter(availableChapters[0]);
            } else {
                document.getElementById('content-box').innerHTML = '<div class="loading" style="color: #ef4444;">File rỗng hoặc không đúng định dạng.</div>';
            }
        }

        // Trình render UI cho AI
        function parseAIContent(rawText) {
            let lines = rawText.split('\\n');
            let html = '';
            
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (!line) continue;
                
                if (line.includes('[DIỄN BIẾN CHÍNH]')) {
                    html += '<div class="section-title">📜 Diễn Biến Chính</div>';
                } else if (line.includes('[HỒ SƠ TÌNH TRẠNG & TIẾN HÓA]')) {
                    html += '<div class="section-title">👤 Hồ Sơ Nhân Vật</div>';
                } else if (line.includes('[MANH MỐI & BÍ ẨN]')) {
                    html += '<div class="section-title">🔍 Manh Mối & Bí Ẩn</div>';
                } else if (line.startsWith('- ')) {
                    let parts = line.substring(2).split('|').map(s => s.trim());
                    let name = parts[0] || 'Vô danh';
                    let tuvi = parts[1] || '';
                    let status = parts[2] || '';
                    
                    let tuviHtml = tuvi ? `<span class="badge tuvi">${tuvi}</span>` : '';
                    let statusHtml = status ? `<span class="badge status">${status}</span>` : '';
                    
                    html += `<div class="char-card">
                                <div class="char-main">
                                    <span class="char-name">${name}</span>
                                    ${tuviHtml}
                                    ${statusHtml}
                                </div>`;
                    
                    if (i + 1 < lines.length && (lines[i+1].includes('↳') || lines[i+1].includes('CẬP NHẬT'))) {
                        let cleanUpdate = lines[i+1].replace(/↳|⚠|CẬP NHẬT:/g, '').trim();
                        html += `<div class="char-update"><b>⚡ Cập nhật:</b> ${cleanUpdate}</div>`;
                        i++;
                    }
                    html += `</div>`; 
                } else if (line.startsWith('✦')) {
                    let clue = line.substring(1).trim();
                    html += `<div class="clue-item"><span>✦</span> ${clue}</div>`;
                } else if (!line.includes('↳') && !line.includes('CẬP NHẬT:')) {
                    html += `<p class="story-text">${line}</p>`;
                }
            }
            return html;
        }

        // Hiển thị chương từ biến storyData
        function loadChapter(chapNum) {
            chapNum = parseInt(chapNum);
            currentChapter = chapNum;
            
            const contentBox = document.getElementById('content-box');
            const chapSelect = document.getElementById('chap-select');
            
            if (storyData[chapNum]) {
                contentBox.innerHTML = parseAIContent(storyData[chapNum]); 
                if(chapSelect) chapSelect.value = currentChapter;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                contentBox.innerHTML = `<div class="loading" style="color: #ef4444;">Lỗi: Không tìm thấy dữ liệu chương ${chapNum}.</div>`;
            }
        }

        function changeChapter(step) {
            if (availableChapters.length === 0) return;

            let currentIndex = availableChapters.indexOf(currentChapter);
            let nextIndex = currentIndex + step;

            if (nextIndex < 0) {
                showToast("Đây là chương đầu tiên rồi!");
                return;
            }
            if (nextIndex >= availableChapters.length) {
                showToast("Đã đến chương cuối cùng của truyện!");
                return;
            }

            let nextChapNum = availableChapters[nextIndex];
            if (nextChapNum - currentChapter > 1 && step > 0) {
                showToast(`Phát hiện thiếu chương! Đã nhảy vọt từ ${currentChapter} lên ${nextChapNum}`);
            }
            
            loadChapter(nextChapNum);
        }

        window.onload = fetchStoryFile;
    </script>
</body>
</html>
